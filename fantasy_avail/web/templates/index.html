<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Available Streamers</title>
  <link rel="icon" href="{{ url_for('static', filename='baseball-streamer-logo.png') }}" type="image/png">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header class="page-header">
    <div class="header-top">
      <div class="header-brand">
        <img
          src="{{ url_for('static', filename='baseball-streamer-logo.png') }}"
          alt=""
          class="header-logo"
          width="36"
          height="36"
        >
        <h1>Available Streamers</h1>
      </div>
      <button type="button" id="refresh-btn" class="refresh-btn">Refresh</button>
    </div>
    <p id="date-range" class="date-range"></p>
    <p id="meta" class="meta"></p>
  </header>

  <main id="content">
    <p class="loading">Loading pitchers…</p>
  </main>

  <script>
    const contentEl = document.getElementById("content");
    const dateRangeEl = document.getElementById("date-range");
    const metaEl = document.getElementById("meta");
    const refreshBtn = document.getElementById("refresh-btn");

    const AVAIL_LABELS = {
      free_agent: "FA",
      waivers: "W",
      na_free_agent: "NA",
    };

    function formatDateHeader(isoDate) {
      const d = new Date(isoDate + "T12:00:00");
      return d.toLocaleDateString("en-US", {
        weekday: "long",
        month: "short",
        day: "numeric",
      });
    }

    function formatCachedAt(iso) {
      if (!iso) return "";
      const d = new Date(iso);
      return d.toLocaleString("en-US", {
        month: "short",
        day: "numeric",
        hour: "numeric",
        minute: "2-digit",
        timeZoneName: "short",
      });
    }

    function parseInningsPitched(value) {
      if (value == null || value === "—") return null;
      const text = String(value).trim();
      if (!text || text === "—") return null;
      if (text.includes(".")) {
        const [whole, frac] = text.split(".", 2);
        if (frac.length === 1 && "012".includes(frac)) {
          return parseInt(whole, 10) + parseInt(frac, 10) / 3;
        }
      }
      const n = parseFloat(text);
      return Number.isFinite(n) ? n : null;
    }

    function parseStatFloat(value) {
      if (value == null || value === "—") return null;
      const n = parseFloat(String(value).trim());
      return Number.isFinite(n) ? n : null;
    }

    function eraHighlight(era) {
      const v = parseStatFloat(era);
      if (v === null) return null;
      if (v > 6) return "bad";
      if (v > 5) return "warn";
      if (v < 4) return "good";
      return null;
    }

    function whipHighlight(whip) {
      const v = parseStatFloat(whip);
      if (v === null) return null;
      if (v > 1.7) return "bad";
      if (v > 1.5) return "warn";
      if (v < 1.2) return "good";
      return null;
    }

    function kPer9(strikeouts, inningsPitched) {
      const ip = parseInningsPitched(inningsPitched);
      if (ip === null || ip <= 0) return null;
      const ks = Number(strikeouts);
      if (!Number.isFinite(ks)) return null;
      return (ks / ip) * 9;
    }

    function formatKPer9(value) {
      if (value === null) return "—";
      const rounded = Math.round(value * 10) / 10;
      if (rounded === Math.floor(rounded)) return String(Math.floor(rounded));
      return String(rounded);
    }

    function kPer9Highlight(strikeouts, inningsPitched) {
      const value = kPer9(strikeouts, inningsPitched);
      if (value === null) return null;
      return value >= 9 ? "good" : null;
    }

    function statHighlights(stats) {
      return {
        era: eraHighlight(stats.era),
        whip: whipHighlight(stats.whip),
        k_per_9: kPer9Highlight(stats.strikeouts, stats.innings_pitched),
      };
    }

    function statHighlightClass(level) {
      return level ? `stat-${level}` : "";
    }

    function appendStatPart(parent, text, level) {
      const cls = statHighlightClass(level);
      if (cls) {
        const span = document.createElement("span");
        span.className = cls;
        span.textContent = text;
        parent.appendChild(span);
      } else {
        parent.appendChild(document.createTextNode(text));
      }
    }

    function renderStatsLine(stats, parentEl) {
      parentEl.replaceChildren();
      if (!stats) {
        parentEl.textContent = "Stats unavailable";
        return;
      }
      const h = statHighlights(stats);
      const wl = `${stats.wins ?? 0}-${stats.losses ?? 0}`;
      parentEl.appendChild(document.createTextNode(`${wl} · `));
      appendStatPart(parentEl, `${stats.era ?? "—"} ERA`, h.era);
      parentEl.appendChild(document.createTextNode(" · "));
      appendStatPart(parentEl, `${stats.whip ?? "—"} WHIP`, h.whip);
      parentEl.appendChild(document.createTextNode(" · "));
      parentEl.appendChild(document.createTextNode(`${stats.innings_pitched ?? "—"} IP`));
      parentEl.appendChild(document.createTextNode(" · "));
      const k9 = kPer9(stats.strikeouts, stats.innings_pitched);
      appendStatPart(parentEl, `${formatKPer9(k9)} K/9`, h.k_per_9);
    }

    function renderMatchup(p, parentEl) {
      parentEl.replaceChildren();
      parentEl.appendChild(document.createTextNode(`${p.pitcher_team} `));
      parentEl.appendChild(document.createTextNode(p.home_away === "away" ? "@ " : "vs "));
      appendStatPart(parentEl, p.opponent_team, p.opponent_highlight);
      if (p.opposing_pitcher_name) {
        parentEl.appendChild(document.createTextNode(` (${p.opposing_pitcher_name})`));
      }
      parentEl.appendChild(document.createTextNode(` · ${p.game_time_pt} · ${homeAwayLabel(p.home_away)}`));
    }

    function homeAwayLabel(value) {
      return value === "away" ? "Away" : "Home";
    }

    function renderPitchers(data) {
      dateRangeEl.textContent = data.date_range
        ? `Next ${data.days} days: ${data.date_range}`
        : "";

      const cachedLabel = data.cached ? "Cached" : "Fresh";
      const updated = data.cached_at ? ` · Updated ${formatCachedAt(data.cached_at)}` : "";
      metaEl.textContent = `${cachedLabel}${updated}`;

      if (data.warnings && data.warnings.length) {
        const warn = document.createElement("div");
        warn.className = "warnings";
        warn.textContent = data.warnings.join(" ");
        contentEl.innerHTML = "";
        contentEl.appendChild(warn);
      } else {
        contentEl.innerHTML = "";
      }

      const pitchers = data.pitchers || [];
      if (!pitchers.length) {
        const empty = document.createElement("p");
        empty.className = "empty";
        empty.textContent = "No available probable starters in this window.";
        contentEl.appendChild(empty);
        return;
      }

      let currentDate = null;
      let section = null;
      let sectionBody = null;
      let dayIndex = 0;

      for (const p of pitchers) {
        if (p.date !== currentDate) {
          currentDate = p.date;
          dayIndex += 1;

          section = document.createElement("section");
          section.className = "day-section";

          const heading = document.createElement("h2");
          heading.className = "day-heading";
          const toggle = document.createElement("button");
          toggle.type = "button";
          toggle.className = "day-toggle";
          toggle.setAttribute("aria-expanded", "true");

          const bodyId = `day-body-${dayIndex}`;
          toggle.setAttribute("aria-controls", bodyId);

          const title = document.createElement("span");
          title.className = "day-title";
          title.textContent = formatDateHeader(p.date);

          const caret = document.createElement("span");
          caret.className = "day-caret";
          caret.setAttribute("aria-hidden", "true");

          toggle.appendChild(title);
          toggle.appendChild(caret);
          heading.appendChild(toggle);
          section.appendChild(heading);

          sectionBody = document.createElement("div");
          sectionBody.id = bodyId;
          sectionBody.className = "day-body";
          section.appendChild(sectionBody);

          const daySection = section;
          const dayBody = sectionBody;
          toggle.addEventListener("click", () => {
            const isCollapsed = daySection.classList.toggle("is-collapsed");
            toggle.setAttribute("aria-expanded", String(!isCollapsed));
            dayBody.hidden = isCollapsed;
          });

          contentEl.appendChild(section);
        }

        const card = document.createElement("article");
        card.className = "pitcher-card";

        const top = document.createElement("div");
        top.className = "card-top";

        const name = document.createElement("h3");
        name.className = "pitcher-name";
        if (p.yahoo_gamelog_url) {
          const link = document.createElement("a");
          link.href = p.yahoo_gamelog_url;
          link.target = "_blank";
          link.rel = "noopener noreferrer";
          link.textContent = p.name;
          name.appendChild(link);
        } else {
          name.textContent = p.name;
        }

        const badge = document.createElement("span");
        badge.className = `badge badge-${p.availability || "free_agent"}`;
        badge.textContent = AVAIL_LABELS[p.availability] || "FA";

        top.appendChild(name);
        top.appendChild(badge);

        const matchup = document.createElement("p");
        matchup.className = "matchup";
        renderMatchup(p, matchup);

        const stats = document.createElement("p");
        stats.className = "stats";
        renderStatsLine(p.stats, stats);

        card.appendChild(top);
        card.appendChild(matchup);
        card.appendChild(stats);
        sectionBody.appendChild(card);
      }
    }

    async function loadPitchers(refresh = false) {
      refreshBtn.disabled = true;
      const started = Date.now();
      const timer = setInterval(() => {
        const secs = Math.floor((Date.now() - started) / 1000);
        const hint = secs < 10
          ? "Loading pitchers…"
          : secs < 60
            ? `Loading pitchers… (${secs}s — first load can take up to 2 minutes)`
            : `Still loading… (${secs}s — fetching Yahoo availability for probable starters)`;
        contentEl.innerHTML = `<p class="loading">${hint}</p>`;
      }, 1000);
      contentEl.innerHTML = '<p class="loading">Loading pitchers…</p>';
      try {
        const url = refresh ? "/api/pitchers?refresh=1" : "/api/pitchers";
        const resp = await fetch(url);
        const text = await resp.text();
        let data;
        try {
          data = JSON.parse(text);
        } catch (_) {
          throw new Error("Server returned an invalid response. Check the terminal for errors.");
        }
        if (!resp.ok) {
          throw new Error(data.error || "Failed to load pitchers");
        }
        renderPitchers(data);
      } catch (err) {
        contentEl.innerHTML = `<p class="error">${err.message}</p>`;
      } finally {
        clearInterval(timer);
        refreshBtn.disabled = false;
      }
    }

    refreshBtn.addEventListener("click", () => loadPitchers(true));
    loadPitchers(false);
  </script>
</body>
</html>
