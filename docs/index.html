<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Available Streamers</title>
  <link rel="icon" href="./static/baseball-streamer-logo.png" type="image/png">
  <link rel="stylesheet" href="./static/style.css">
  <script src="./js/config.js"></script>
</head>
<body>
  <header class="page-header">
    <div class="header-top">
      <div class="header-brand">
        <img
          src="./static/baseball-streamer-logo.png"
          alt=""
          class="header-logo"
          width="36"
          height="36"
        >
        <h1>Available Streamers</h1>
      </div>
      <button type="button" id="refresh-btn" class="refresh-btn">Refresh</button>
    </div>
    <p id="date-range" class="date-range"></p>
    <p id="meta" class="meta"></p>
  </header>

  <main id="content">
    <p class="loading">Loading pitchers…</p>
  </main>

  <script>
    const contentEl = document.getElementById("content");
    const dateRangeEl = document.getElementById("date-range");
    const metaEl = document.getElementById("meta");
    const refreshBtn = document.getElementById("refresh-btn");
    const ghConfig = window.GH_PAGES_CONFIG || {};

    const AVAIL_LABELS = {
      free_agent: "FA",
      waivers: "W",
      na_free_agent: "NA",
    };

    function formatDateHeader(isoDate) {
      const d = new Date(isoDate + "T12:00:00");
      return d.toLocaleDateString("en-US", {
        weekday: "long",
        month: "short",
        day: "numeric",
      });
    }

    function formatCachedAt(iso) {
      if (!iso) return "";
      const d = new Date(iso);
      return d.toLocaleString("en-US", {
        month: "short",
        day: "numeric",
        hour: "numeric",
        minute: "2-digit",
        timeZoneName: "short",
      });
    }

    function parseInningsPitched(value) {
      if (value == null || value === "—") return null;
      const text = String(value).trim();
      if (!text || text === "—") return null;
      if (text.includes(".")) {
        const [whole, frac] = text.split(".", 2);
        if (frac.length === 1 && "012".includes(frac)) {
          return parseInt(whole, 10) + parseInt(frac, 10) / 3;
        }
      }
      const n = parseFloat(text);
      return Number.isFinite(n) ? n : null;
    }

    function parseStatFloat(value) {
      if (value == null || value === "—") return null;
      const n = parseFloat(String(value).trim());
      return Number.isFinite(n) ? n : null;
    }

    function eraHighlight(era) {
      const v = parseStatFloat(era);
      if (v === null) return null;
      if (v > 6) return "bad";
      if (v > 5) return "warn";
      if (v < 4) return "good";
      return null;
    }

    function whipHighlight(whip) {
      const v = parseStatFloat(whip);
      if (v === null) return null;
      if (v > 1.7) return "bad";
      if (v > 1.5) return "warn";
      if (v < 1.2) return "good";
      return null;
    }

    function kPer9(strikeouts, inningsPitched) {
      const ip = parseInningsPitched(inningsPitched);
      if (ip === null || ip <= 0) return null;
      const ks = Number(strikeouts);
      if (!Number.isFinite(ks)) return null;
      return (ks / ip) * 9;
    }

    function formatKPer9(value) {
      if (value === null) return "—";
      const rounded = Math.round(value * 10) / 10;
      if (rounded === Math.floor(rounded)) return String(Math.floor(rounded));
      return String(rounded);
    }

    function kPer9Highlight(strikeouts, inningsPitched) {
      const value = kPer9(strikeouts, inningsPitched);
      if (value === null) return null;
      return value >= 9 ? "good" : null;
    }

    function statHighlights(stats) {
      return {
        era: eraHighlight(stats.era),
        whip: whipHighlight(stats.whip),
        k_per_9: kPer9Highlight(stats.strikeouts, stats.innings_pitched),
      };
    }

    function statHighlightClass(level) {
      return level ? `stat-${level}` : "";
    }

    function appendStatPart(parent, text, level) {
      const cls = statHighlightClass(level);
      if (cls) {
        const span = document.createElement("span");
        span.className = cls;
        span.textContent = text;
        parent.appendChild(span);
      } else {
        parent.appendChild(document.createTextNode(text));
      }
    }

    function renderStatsLine(stats, parentEl) {
      parentEl.replaceChildren();
      if (!stats) {
        parentEl.textContent = "Stats unavailable";
        return;
      }
      const h = statHighlights(stats);
      const wl = `${stats.wins ?? 0}-${stats.losses ?? 0}`;
      parentEl.appendChild(document.createTextNode(`${wl} · `));
      appendStatPart(parentEl, `${stats.era ?? "—"} ERA`, h.era);
      parentEl.appendChild(document.createTextNode(" · "));
      appendStatPart(parentEl, `${stats.whip ?? "—"} WHIP`, h.whip);
      parentEl.appendChild(document.createTextNode(" · "));
      parentEl.appendChild(document.createTextNode(`${stats.innings_pitched ?? "—"} IP`));
      parentEl.appendChild(document.createTextNode(" · "));
      const k9 = kPer9(stats.strikeouts, stats.innings_pitched);
      appendStatPart(parentEl, `${formatKPer9(k9)} K/9`, h.k_per_9);
    }

    function renderMatchup(p, parentEl) {
      parentEl.replaceChildren();
      parentEl.appendChild(document.createTextNode(`${p.pitcher_team} `));
      parentEl.appendChild(document.createTextNode(p.home_away === "away" ? "@ " : "vs "));
      appendStatPart(parentEl, p.opponent_team, p.opponent_highlight);
      if (p.opposing_pitcher_name) {
        parentEl.appendChild(document.createTextNode(` (${p.opposing_pitcher_name})`));
      }
      parentEl.appendChild(document.createTextNode(` · ${p.game_time_pt} · ${homeAwayLabel(p.home_away)}`));
    }

    function homeAwayLabel(value) {
      return value === "away" ? "Away" : "Home";
    }

    function renderPitchers(data, { refreshNotice = null } = {}) {
      dateRangeEl.textContent = data.date_range
        ? `Next ${data.days} days: ${data.date_range}`
        : "";

      const updated = data.cached_at ? `Updated ${formatCachedAt(data.cached_at)}` : "";
      const schedule = " · Auto-refresh every 6 hours";
      metaEl.textContent = updated ? `${updated}${schedule}` : `No data loaded yet${schedule}`;

      contentEl.innerHTML = "";
      if (refreshNotice) {
        const notice = document.createElement("div");
        notice.className = "warnings";
        notice.textContent = refreshNotice;
        contentEl.appendChild(notice);
      }
      if (data.warnings && data.warnings.length) {
        const warn = document.createElement("div");
        warn.className = "warnings";
        warn.textContent = data.warnings.join(" ");
        contentEl.appendChild(warn);
      }

      const pitchers = data.pitchers || [];
      if (!pitchers.length) {
        const empty = document.createElement("p");
        empty.className = "empty";
        empty.textContent = "No available probable starters in this window.";
        contentEl.appendChild(empty);
        return;
      }

      let currentDate = null;
      let section = null;

      for (const p of pitchers) {
        if (p.date !== currentDate) {
          currentDate = p.date;
          section = document.createElement("section");
          section.className = "day-section";

          const heading = document.createElement("h2");
          heading.className = "day-heading";
          heading.textContent = formatDateHeader(p.date);
          section.appendChild(heading);

          contentEl.appendChild(section);
        }

        const card = document.createElement("article");
        card.className = "pitcher-card";

        const top = document.createElement("div");
        top.className = "card-top";

        const name = document.createElement("h3");
        name.className = "pitcher-name";
        if (p.yahoo_gamelog_url) {
          const link = document.createElement("a");
          link.href = p.yahoo_gamelog_url;
          link.target = "_blank";
          link.rel = "noopener noreferrer";
          link.textContent = p.name;
          name.appendChild(link);
        } else {
          name.textContent = p.name;
        }

        const badge = document.createElement("span");
        badge.className = `badge badge-${p.availability || "free_agent"}`;
        badge.textContent = AVAIL_LABELS[p.availability] || "FA";

        top.appendChild(name);
        top.appendChild(badge);

        const matchup = document.createElement("p");
        matchup.className = "matchup";
        renderMatchup(p, matchup);

        const stats = document.createElement("p");
        stats.className = "stats";
        renderStatsLine(p.stats, stats);

        card.appendChild(top);
        card.appendChild(matchup);
        card.appendChild(stats);
        section.appendChild(card);
      }
    }

    function pitchersUrl(cacheBust = false) {
      const base = "./data/pitchers.json";
      return cacheBust ? `${base}?t=${Date.now()}` : base;
    }

    async function fetchPitchers(cacheBust = false) {
      const resp = await fetch(pitchersUrl(cacheBust));
      const text = await resp.text();
      let data;
      try {
        data = JSON.parse(text);
      } catch (_) {
        throw new Error("Could not read pitcher data.");
      }
      if (!resp.ok) {
        throw new Error(data.error || "Failed to load pitchers");
      }
      return data;
    }

    function refreshDispatchNotice(result) {
      if (result.ok) return null;
      if (result.reason === "no_token") {
        return "Live refresh unavailable (no dispatch token on this site). Showing last cached data.";
      }
      if (result.status === 401) {
        return "Live refresh unavailable (dispatch token rejected by GitHub). If you just updated PAGES_REFRESH_TOKEN, run the Refresh pitcher data workflow once so it republishes docs/js/config.js. The token also needs Actions: Read and write on this repo.";
      }
      const detail = result.detail || (result.status ? `HTTP ${result.status}` : "unknown error");
      return `Live refresh unavailable (${detail}). Showing last cached data.`;
    }

    async function dispatchRefreshWorkflow() {
      const token = ghConfig.dispatchToken;
      if (!token || !ghConfig.repo || !ghConfig.workflowFile) {
        return { ok: false, reason: "no_token" };
      }
      const resp = await fetch(
        `https://api.github.com/repos/${ghConfig.repo}/actions/workflows/${ghConfig.workflowFile}/dispatches`,
        {
          method: "POST",
          headers: {
            Accept: "application/vnd.github+json",
            Authorization: `Bearer ${token}`,
            "X-GitHub-Api-Version": "2022-11-28",
          },
          body: JSON.stringify({ ref: "main" }),
        }
      );
      if (!resp.ok) {
        let detail = "";
        try {
          const body = await resp.json();
          detail = body.message || "";
        } catch (_) {
          /* ignore */
        }
        return { ok: false, reason: "dispatch_failed", status: resp.status, detail };
      }
      return { ok: true };
    }

    function sleep(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    async function pollForUpdatedData(previousCachedAt, maxWaitMs = 180000) {
      const deadline = Date.now() + maxWaitMs;
      while (Date.now() < deadline) {
        await sleep(10000);
        const data = await fetchPitchers(true);
        if (data.cached_at && data.cached_at !== previousCachedAt) {
          return data;
        }
      }
      return fetchPitchers(true);
    }

    async function loadPitchers({ refresh = false } = {}) {
      refreshBtn.disabled = true;
      const started = Date.now();
      const timer = setInterval(() => {
        const secs = Math.floor((Date.now() - started) / 1000);
        const hint = refresh
          ? secs < 15
            ? "Starting refresh…"
            : `Fetching fresh data… (${secs}s)`
          : "Loading pitchers…";
        contentEl.innerHTML = `<p class="loading">${hint}</p>`;
      }, 1000);
      contentEl.innerHTML = '<p class="loading">Loading pitchers…</p>';

      try {
        let data = await fetchPitchers(refresh);
        let refreshNotice = null;
        if (refresh) {
          const previousCachedAt = data.cached_at;
          const dispatch = await dispatchRefreshWorkflow();
          if (dispatch.ok) {
            data = await pollForUpdatedData(previousCachedAt);
          } else {
            refreshNotice = refreshDispatchNotice(dispatch);
            data = await fetchPitchers(true);
          }
        }
        renderPitchers(data, { refreshNotice });
      } catch (err) {
        contentEl.innerHTML = `<p class="error">${err.message}</p>`;
      } finally {
        clearInterval(timer);
        refreshBtn.disabled = false;
      }
    }

    refreshBtn.addEventListener("click", () => loadPitchers({ refresh: true }));
    loadPitchers({ refresh: false });
  </script>
</body>
</html>
