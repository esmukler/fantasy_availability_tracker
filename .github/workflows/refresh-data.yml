name: Refresh pitcher data

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write secrets
        env:
          YAHOO_OAUTH_JSON: ${{ secrets.YAHOO_OAUTH_JSON }}
          FP_COOKIE: ${{ secrets.FP_COOKIE }}
        run: |
          printf '%s' "$YAHOO_OAUTH_JSON" > oauth2.json
          if [ -n "$FP_COOKIE" ]; then
            printf '%s' "$FP_COOKIE" > fantasypros_cookie.txt
          fi

      - name: Export pitcher data
        env:
          PYTHONPATH: .
        run: python -m fantasy_avail.web.export --output docs/data/pitchers.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/pitchers.json team_ops_*.csv
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: refresh pitcher data [skip ci]"
          git push
