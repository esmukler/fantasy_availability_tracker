name: Refresh pitcher data

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write secrets
        env:
          YAHOO_OAUTH_JSON: ${{ secrets.YAHOO_OAUTH_JSON }}
          FP_COOKIE: ${{ secrets.FP_COOKIE }}
        run: |
          printf '%s' "$YAHOO_OAUTH_JSON" > oauth2.json
          if [ -n "$FP_COOKIE" ]; then
            printf '%s' "$FP_COOKIE" > fantasypros_cookie.txt
          fi

      - name: Export pitcher data
        env:
          PYTHONPATH: .
        run: python -m fantasy_avail.web.export --output docs/data/pitchers.json

      - name: Write Pages config
        env:
          PAGES_REFRESH_TOKEN: ${{ secrets.PAGES_REFRESH_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python <<'PY'
          import json
          import os
          from pathlib import Path

          config = {
              "repo": os.environ["GITHUB_REPOSITORY"],
              "workflowFile": "refresh-data.yml",
              "dispatchToken": os.environ.get("PAGES_REFRESH_TOKEN", ""),
          }
          lines = [
              "// Generated by .github/workflows/refresh-data.yml — do not edit by hand.",
              f"window.GH_PAGES_CONFIG = {json.dumps(config, indent=2)};",
              "",
          ]
          Path("docs/js/config.js").write_text("\n".join(lines), encoding="utf-8")
          PY

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/pitchers.json docs/js/config.js
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: refresh pitcher data [skip ci]"
          git push
